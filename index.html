<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>nRF52840 BLE 打字傳輸器</title>
  <style>
    :root {
      --line: #334155;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, "Noto Sans TC", sans-serif;
      background: linear-gradient(135deg, #020617, #0f172a 45%, #111827);
      color: var(--text);
      min-height: 100vh;
      padding: 18px;
    }
    .wrap { max-width: 980px; margin: 0 auto; display: grid; gap: 16px; }
    .card {
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.28);
      backdrop-filter: blur(10px);
    }
    h1 { font-size: 24px; margin: 0 0 4px; }
    .ver { color: #475569; font-size: 12px; margin-bottom: 8px; }
    .sub { color: var(--muted); font-size: 14px; line-height: 1.6; margin-bottom: 10px; }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 12px; }
    .full { grid-column: 1 / -1; }
    label { display: block; font-size: 14px; color: #cbd5e1; margin-bottom: 6px; }
    input[type="file"], select, textarea {
      width: 100%; padding: 12px; border-radius: 12px;
      border: 1px solid var(--line); background: #0b1220;
      color: var(--text); font-size: 15px; outline: none;
    }
    textarea { min-height: 240px; resize: vertical; line-height: 1.6; white-space: pre-wrap; }
    .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    button {
      border: 0; border-radius: 12px; padding: 12px 16px;
      font-size: 15px; font-weight: 700; cursor: pointer; color: white; background: #2563eb;
    }
    button.good { background: #16a34a; }
    button.warn { background: #ea580c; }
    button.danger { background: var(--danger); }
    button.secondary { background: #0ea5e9; }
    button:disabled { opacity: 0.55; cursor: not-allowed; }
    .status {
      padding: 10px 12px; border-radius: 12px;
      background: #0b1220; border: 1px solid var(--line);
      color: #bfdbfe; font-size: 14px;
    }
    .mono { font-family: Consolas, Menlo, monospace; font-size: 13px; }
    .hint { color: var(--muted); font-size: 13px; line-height: 1.6; }
    .checkbox {
      display: flex; gap: 10px; align-items: center;
      min-height: 48px; padding: 12px; border-radius: 12px;
      border: 1px solid var(--line); background: #0b1220;
    }
    .checkbox input { transform: scale(1.2); }
    pre { margin: 0; white-space: pre-wrap; word-break: break-word; line-height: 1.55; }
    @media (max-width: 760px) {
      .grid { grid-template-columns: 1fr; }
      body { padding: 12px; }
      h1 { font-size: 21px; }
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>nRF52840 BLE 打字傳輸器</h1>
    <div class="ver">v2.0.0 — ACK 握手協議</div>
    <div class="sub">
      Android Chrome 透過 Web Bluetooth 連線到 nRF52840，將文字經由 BLE 傳給開發板，
      再由開發板用 USB HID Keyboard 打字到電腦。
    </div>
    <div class="status" id="status">尚未連線</div>
  </div>

  <div class="card">
    <div class="row">
      <button id="btnConnect" class="good">連接藍牙</button>
      <button id="btnDisconnect" class="danger">中斷連線</button>
      <button id="btnPing" class="secondary">測試通訊</button>
    </div>
    <div class="hint" style="margin-top:10px;">
      需要 <b>HTTPS</b> 或 localhost，以 Android Chrome 開啟。
    </div>
  </div>

  <div class="card">
    <div class="grid">
      <div>
        <label for="fileInput">上傳 TXT 檔</label>
        <input id="fileInput" type="file" accept=".txt,text/plain" />
      </div>
      <div>
        <label for="speed">打字速度</label>
        <select id="speed">
          <option value="5">很慢（每秒 5 字）</option>
          <option value="10">慢（每秒 10 字）</option>
          <option value="20" selected>中（每秒 20 字）</option>
          <option value="35">快（每秒 35 字）</option>
          <option value="60">很快（每秒 60 字）</option>
        </select>
      </div>
      <div>
        <label for="imeCommand">切換輸入法命令</label>
        <select id="imeCommand">
          <option value="">不切換</option>
          <option value="WIN_SPACE">Windows + Space</option>
          <option value="CTRL_SPACE">Ctrl + Space</option>
          <option value="SHIFT_SPACE">Shift + Space</option>
          <option value="ALT_SHIFT">Alt + Shift</option>
        </select>
      </div>
      <div>
        <label>&nbsp;</label>
        <div class="checkbox">
          <input id="autoIme" type="checkbox" checked />
          <span>打字前先自動切換輸入法</span>
        </div>
      </div>
      <div class="full">
        <label for="textInput">文字輸入區</label>
        <textarea id="textInput" placeholder="請貼上要傳給 nRF52840 的文字，支援換行。"></textarea>
      </div>
    </div>
    <div class="row" style="margin-top:12px;">
      <button id="btnSend" class="good">傳送到開發板</button>
      <button id="btnStop" class="warn">停止打字</button>
      <button id="btnClear">清空文字</button>
    </div>
  </div>

  <div class="card">
    <label>記錄</label>
    <div class="status mono"><pre id="logBox">等待操作...</pre></div>
  </div>
</div>

<script>
  // ── Nordic UART Service UUIDs ──
  const NUS_SERVICE = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
  const NUS_RX      = '6e400002-b5a3-f393-e0a9-e50e24dcca9e'; // Web → nRF
  const NUS_TX      = '6e400003-b5a3-f393-e0a9-e50e24dcca9e'; // nRF → Web

  // ── 協議常數 ──
  // 每行指令格式（純文字，以 \n 結尾）：
  //   PING\n
  //   BEGIN <cps> <switchIme> <imeCmd>\n
  //   DATA <base64chunk>\n
  //   END\n
  //   STOP\n
  // 韌體回應：OK\n 或 ERR\n

  const ACK_TIMEOUT = 5000;
  const CHUNK_SIZE  = 6;   // base64 chunk 大小
  const SEG_SIZE    = 48;  // 每段文字字元數（一次 BEGIN/DATA.../END 流程）

  let device = null, rxChar = null, txChar = null;
  let busy = false;
  let stopFlag = false;
  let ackResolve = null; // 等待 ACK 的 Promise resolver

  const enc = new TextEncoder();
  const dec = new TextDecoder();

  const statusEl  = document.getElementById('status');
  const logBox    = document.getElementById('logBox');
  const textInput = document.getElementById('textInput');
  const fileInput = document.getElementById('fileInput');
  const speedEl   = document.getElementById('speed');
  const autoImeEl = document.getElementById('autoIme');
  const imeCmdEl  = document.getElementById('imeCommand');

  function log(msg) {
    const t = new Date().toLocaleTimeString();
    logBox.textContent += `\n[${t}] ${msg}`;
    logBox.parentElement.scrollTop = logBox.parentElement.scrollHeight;
  }

  function setStatus(msg) { statusEl.textContent = msg; }

  function isConnected() {
    return !!(device && device.gatt && device.gatt.connected && rxChar && txChar);
  }

  // ── 送一行純文字（自動加 \n）──
  async function sendLine(line) {
    const data = enc.encode(line + '\n');
    log(`TX → ${line}`);
    // 優先用 writeValue（有回應），更可靠
    try {
      await rxChar.writeValue(data);
    } catch {
      await rxChar.writeValueWithoutResponse(data);
    }
  }

  // ── 送一行並等待 ACK（回傳 true=OK, false=ERR/timeout）──
  function waitAck() {
    return new Promise((resolve) => {
      const timer = setTimeout(() => {
        ackResolve = null;
        log('⚠ ACK timeout');
        resolve(false);
      }, ACK_TIMEOUT);
      ackResolve = (ok) => {
        clearTimeout(timer);
        ackResolve = null;
        resolve(ok);
      };
    });
  }

  async function sendAndAck(line) {
    const p = waitAck();
    await sendLine(line);
    return p;
  }

  // ── 處理韌體回傳的通知 ──
  function onNotify(event) {
    const text = dec.decode(new Uint8Array(event.target.value.buffer)).trim();
    log(`RX ← ${text}`);
    if (text === 'READY') return;
    if (text === 'DONE' && doneResolve) { doneResolve(); return; }
    if (ackResolve) {
      if (text === 'OK')  ackResolve(true);
      if (text === 'ERR') ackResolve(false);
    }
  }

  // ── 連線 ──
  async function connectBle() {
    if (!navigator.bluetooth) throw new Error('此瀏覽器不支援 Web Bluetooth');
    setStatus('搜尋裝置...');
    device = await navigator.bluetooth.requestDevice({
      filters: [{ services: [NUS_SERVICE] }],
      optionalServices: [NUS_SERVICE]
    });
    device.addEventListener('gattserverdisconnected', () => {
      setStatus('已中斷');
      log('藍牙已中斷');
      rxChar = txChar = null;
    });
    const server  = await device.gatt.connect();
    const service = await server.getPrimaryService(NUS_SERVICE);
    rxChar = await service.getCharacteristic(NUS_RX);
    txChar = await service.getCharacteristic(NUS_TX);
    await txChar.startNotifications();
    txChar.addEventListener('characteristicvaluechanged', onNotify);
    setStatus(`已連線：${device.name || '未命名'}`);
    log('連線成功');
  }

  // ── 傳送單一段落（BEGIN → DATA... → END），等待 typing_done 後才 resolve ──
  async function sendSegment(seg, cps, switchIme, imeCmd) {
    const ok = await sendAndAck(`BEGIN ${cps} ${switchIme} ${imeCmd}`);
    if (!ok) throw new Error('BEGIN 未收到 ACK');

    for (let i = 0; i < seg.length; i += CHUNK_SIZE) {
      if (stopFlag) { await sendLine('STOP'); return false; }
      const chunk   = seg.slice(i, i + CHUNK_SIZE);
      const encoded = btoa(unescape(encodeURIComponent(chunk)));
      const ack = await sendAndAck(`DATA ${encoded}`);
      if (!ack) throw new Error('DATA 未收到 ACK');
    }

    const endOk = await sendAndAck('END');
    if (!endOk) throw new Error('END 未收到 ACK');

    // 等韌體打完字（回傳 DONE）
    await waitDone();
    return true;
  }

  // 等待韌體回傳 DONE（打字完成）
  let doneResolve = null;
  function waitDone() {
    return new Promise((resolve) => {
      const timer = setTimeout(() => {
        doneResolve = null;
        resolve(); // timeout 也繼續，避免卡死
      }, 30000);
      doneResolve = () => {
        clearTimeout(timer);
        doneResolve = null;
        resolve();
      };
    });
  }

  // ── 傳送打字任務 ──
  async function sendTypingJob() {
    if (busy) return;
    if (!isConnected()) throw new Error('請先連線');
    const text = textInput.value;
    if (!text.trim()) throw new Error('請先輸入文字');

    busy = true;
    stopFlag = false;

    const cps       = Number(speedEl.value);
    const switchIme = autoImeEl.checked ? '1' : '0';
    const imeCmd    = imeCmdEl.value || 'NONE';
    const total     = text.length;
    let sent        = 0;

    for (let i = 0; i < total; i += SEG_SIZE) {
      if (stopFlag) break;
      const seg = text.slice(i, i + SEG_SIZE);
      setStatus(`傳送中 ${sent}/${total}`);
      await sendSegment(seg, cps, switchIme, imeCmd);
      sent += seg.length;
      log(`段落完成 ${sent}/${total}`);
    }

    log(`全部完成，共 ${total} 字`);
    setStatus('完成');
    busy = false;
  }

  // ── 事件綁定 ──
  fileInput.addEventListener('change', async (e) => {
    const f = e.target.files?.[0];
    if (!f) return;
    textInput.value = await f.text();
    log(`載入：${f.name}（${textInput.value.length} 字元）`);
  });

  document.getElementById('btnConnect').addEventListener('click', async () => {
    try { await connectBle(); }
    catch (e) { log('連線失敗：' + e.message); setStatus('連線失敗'); }
  });

  document.getElementById('btnDisconnect').addEventListener('click', () => {
    device?.gatt?.disconnect();
  });

  document.getElementById('btnPing').addEventListener('click', async () => {
    try {
      const ok = await sendAndAck('PING');
      log(ok ? 'PING → PONG OK' : 'PING 無回應');
    } catch (e) { log('PING 失敗：' + e.message); }
  });

  document.getElementById('btnSend').addEventListener('click', async () => {
    try { await sendTypingJob(); }
    catch (e) { busy = false; log('傳送失敗：' + e.message); setStatus('傳送失敗'); }
  });

  document.getElementById('btnStop').addEventListener('click', async () => {
    stopFlag = true;
    try { await sendLine('STOP'); log('已送出 STOP'); }
    catch (e) { log('STOP 失敗：' + e.message); }
  });

  document.getElementById('btnClear').addEventListener('click', () => {
    textInput.value = '';
    log('已清空');
  });

  log('頁面已就緒');
</script>
</body>
</html>
